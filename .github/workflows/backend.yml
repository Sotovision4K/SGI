name: Backend Deploy

on:
  push:
    branches: [main]
    paths: ['backend/**']
  pull_request:
    branches: [main]
    paths: ['backend/**']
  workflow_dispatch:

concurrency:
  group: backend-${{ github.ref }}
  cancel-in-progress: false

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        run: uv sync
        working-directory: ./backend

      - name: Run lint
        run: uv run ruff check src/
        working-directory: ./backend

      - name: Run tests
        run: uv run pytest
        working-directory: ./backend

  package:
    needs: lint-and-test
    if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    environment: dev

    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        run: uv sync
        working-directory: ./backend

      - name: Package Lambda zip
        run: |
          set -euo pipefail
          rm -rf .packaged
          mkdir -p .packaged/lambda

          # Export prod-only requirements from lockfile (no dev, no project itself)
          cd backend && uv export --no-dev --no-emit-project -o requirements.txt && cd ..

          # Install deps flat into the zip root — Lambda's default sys.path picks them up
          uv pip install --target .packaged/lambda/ -r backend/requirements.txt

          cp -r backend/src .packaged/lambda/
          cp backend/handler.py .packaged/lambda/
          cp backend/trigger_handler.py .packaged/lambda/

          # Cleanup build artifacts
          find .packaged/lambda -type d -name "__pycache__" -exec rm -rf {} + 2>/dev/null || true
          find .packaged/lambda -type f -name "*.pyc" -delete 2>/dev/null || true

          cd .packaged/lambda && zip -qr ../function.zip . && cd ../../..
        working-directory: .

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.DEV_AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.DEV_AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Deploy API Lambda
        run: |
          aws lambda update-function-code \
            --function-name cert-app-dev-api \
            --zip-file fileb://.packaged/function.zip

      - name: Deploy Post-Signup Trigger Lambda
        run: |
          aws lambda update-function-code \
            --function-name cert-app-dev-post-signup \
            --zip-file fileb://.packaged/function.zip

      - name: Wait for API Lambda code update to finish
        run: aws lambda wait function-updated --function-name cert-app-dev-api

      - name: Wait for Trigger Lambda code update to finish
        run: aws lambda wait function-updated --function-name cert-app-dev-post-signup

      # NOTE: DATABASE_URL and ANTHROPIC_API_KEY env vars are set by Terraform
      # via the backend module's environment.variables block. CI only updates
      # function code. To change these secrets, run `terraform apply` with
      # the TF_VAR_ variables set.

      - name: Wait for Lambda update to propagate
        run: sleep 15

      - name: Smoke test /health endpoint
        run: |
          API_ID=$(aws apigateway get-rest-apis \
            --query "items[?name=='cert-app-dev-api'].id" \
            --output text)

          if [ -z "$API_ID" ]; then
            echo "ERROR: Could not find API Gateway ID for 'cert-app-dev-api'"
            exit 1
          fi

          API_URL="https://${API_ID}.execute-api.us-east-1.amazonaws.com/v1/health"
          echo "Smoke testing: ${API_URL}"

          curl -f --retry 5 --retry-delay 5 --max-time 30 "${API_URL}"
