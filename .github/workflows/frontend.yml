name: Frontend Deploy

on:
  push:
    branches: [main]
    paths: ['frontend/**']
  pull_request:
    branches: [main]
    paths: ['frontend/**']

jobs:
  lint-and-build:
    environment: dev
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
          cache-dependency-path: 'frontend/pnpm-lock.yaml'

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.DEV_AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.DEV_AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Get Cognito Configuration from SSM
        id: cognito
        run: |
          USER_POOL_ID=$(aws ssm get-parameter --name /cert-app/dev/cognito/user-pool-id --query Parameter.Value --output text)
          CLIENT_ID=$(aws ssm get-parameter --name /cert-app/dev/cognito/client-id --query Parameter.Value --output text)
          COGNITO_REGION=$(aws ssm get-parameter --name /cert-app/dev/cognito/region --query Parameter.Value --output text)
          echo "USER_POOL_ID=$USER_POOL_ID" >> $GITHUB_OUTPUT
          echo "CLIENT_ID=$CLIENT_ID" >> $GITHUB_OUTPUT
          echo "COGNITO_REGION=$COGNITO_REGION" >> $GITHUB_OUTPUT

      - name: Create environment file
        run: |
          cat > frontend/.env.production << EOF
          VITE_COGNITO_USER_POOL_ID=${{ steps.cognito.outputs.USER_POOL_ID }}
          VITE_COGNITO_CLIENT_ID=${{ steps.cognito.outputs.CLIENT_ID }}
          VITE_COGNITO_REGION=${{ steps.cognito.outputs.COGNITO_REGION }}
          VITE_COGNITO_AUTHORITY=https://cognito-idp.${{ steps.cognito.outputs.COGNITO_REGION }}.amazonaws.com/${{ steps.cognito.outputs.USER_POOL_ID }}
          VITE_COGNITO_DOMAIN=${{ vars.COGNITO_DOMAIN }}
          VITE_REDIRECT_SIGN_IN=https://${{ vars.CF_DOMAIN }}/processes
          VITE_REDIRECT_SIGN_OUT=https://${{ vars.CF_DOMAIN }}/auth/signin
          VITE_REDIRECT_URI=https://${{ vars.CF_DOMAIN }}/
          VITE_API_BASE_URL=${{ vars.API_ENDPOINT }}
          EOF

      - name: Install dependencies
        run: pnpm install 
        working-directory: ./frontend

      - name: Run lint
        run: pnpm lint
        working-directory: ./frontend

      - name: Run build
        run: pnpm build
        working-directory: ./frontend

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: frontend/dist
          retention-days: 1

  deploy:
    needs: lint-and-build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    environment: dev

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: frontend/dist

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.DEV_AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.DEV_AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Deploy to S3
        run: aws s3 sync frontend/dist/ s3://cert-app-dev-frontend/ --delete

      - name: Create CloudFront invalidation
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ vars.CF_DISTRIBUTION_ID }} \
            --paths "/*"